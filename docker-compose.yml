version: '3.8'
services:

  qdrant:
    image: qdrant/qdrant:latest
    container_name: neuralswarm-memory
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./data/qdrant:/qdrant/storage
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G